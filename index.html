<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBE ভার্সন সিলেক্টর | নাহিদ ট্রেডিং সিস্টেম</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            width: 100%;
            background: rgba(18, 25, 45, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(201, 168, 76, 0.2);
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #1a1f2e, #0f1420);
            padding: 28px 24px;
            text-align: center;
            border-bottom: 1px solid rgba(201, 168, 76, 0.3);
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #C9A84C, #E8C97A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .header p {
            color: #8a8f9d;
            margin-top: 8px;
            font-size: 14px;
        }
        .version-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            padding: 32px 28px;
        }
        .version-card {
            background: rgba(22, 28, 45, 0.8);
            border-radius: 24px;
            padding: 28px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(201, 168, 76, 0.1);
            backdrop-filter: blur(5px);
        }
        .version-card:hover {
            transform: translateY(-8px);
            border-color: rgba(201, 168, 76, 0.6);
            background: rgba(30, 38, 60, 0.9);
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .version-icon {
            font-size: 52px;
            margin-bottom: 16px;
        }
        .version-number {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #C9A84C);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 10px;
        }
        .version-desc {
            color: #b0b5c5;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .load-btn {
            background: linear-gradient(90deg, #C9A84C, #B8913A);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            color: #0a0f1e;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            display: inline-block;
        }
        .load-btn:hover {
            transform: scale(1.02);
            background: linear-gradient(90deg, #DAB85E, #C9A13A);
        }
        .footer {
            text-align: center;
            padding: 18px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 12px;
            color: #5a6075;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ TBE ট্রেডিং সিস্টেম</h1>
        <p>আপনার পছন্দের ভার্সন নির্বাচন করুন</p>
    </div>

    <div class="version-grid">
        <div class="version-card" onclick="loadVersion('tbe17')">
            <div class="version-icon">📘</div>
            <div class="version-number">TBE 17</div>
            <div class="version-desc">স্টেবল রিলিজ • বেসিক কোর</div>
            <div class="load-btn">লোড করুন →</div>
        </div>

        <div class="version-card" onclick="loadVersion('tbe18')">
            <div class="version-icon">📙</div>
            <div class="version-number">TBE 18</div>
            <div class="version-desc">আপডেটেড অ্যালগো + VSA</div>
            <div class="load-btn">লোড করুন →</div>
        </div>

        <div class="version-card" onclick="loadVersion('tbe19')">
            <div class="version-icon">⚙️</div>
            <div class="version-number">TBE 19</div>
            <div class="version-desc">অপটিমাইজড এন্ট্রি রুলস</div>
            <div class="load-btn">লোড করুন →</div>
        </div>

        <div class="version-card" onclick="loadVersion('tbe20')">
            <div class="version-icon">🏆</div>
            <div class="version-number">TBE 20</div>
            <div class="version-desc">প্রো ভার্সন + ফুল ফিচার</div>
            <div class="load-btn">লোড করুন →</div>
        </div>
    </div>

    <div class="footer">
        🔥 মিন্টু ভাই & নাহিদ ট্রেডিং টিম | লেটেস্ট ভার্সন TBE 20
    </div>
</div>

<script>
    function loadVersion(version) {
        window.location.href = version + ".html";
    }
</script>
</body>
</html>
