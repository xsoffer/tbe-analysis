<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TBE ভার্সন সিলেক্টর | নাহিদ ট্রেডিং সিস্টেম</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0a0f1e 0%, #0c1222 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(18, 25, 45, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(201, 168, 76, 0.2);
            overflow: hidden;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #1a1f2e, #0f1420);
            padding: 28px 24px;
            text-align: center;
            border-bottom: 1px solid rgba(201, 168, 76, 0.3);
        }
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #C9A84C, #E8C97A);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: 1px;
        }
        .header p {
            color: #8a8f9d;
            margin-top: 8px;
            font-size: 14px;
        }
        .version-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            padding: 28px;
        }
        .version-card {
            background: rgba(22, 28, 45, 0.8);
            border-radius: 20px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(201, 168, 76, 0.1);
        }
        .version-card:hover {
            transform: translateY(-5px);
            border-color: rgba(201, 168, 76, 0.6);
            background: rgba(30, 38, 60, 0.9);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .version-number {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #C9A84C);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .version-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }
        .load-btn {
            background: linear-gradient(90deg, #C9A84C, #B8913A);
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-weight: bold;
            color: #0a0f1e;
            cursor: pointer;
            font-size: 12px;
            transition: 0.2s;
            display: inline-block;
            margin-top: 10px;
        }
        .footer {
            text-align: center;
            padding: 18px;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 12px;
            color: #5a6075;
        }
        .tips {
            text-align: center;
            padding: 0 20px 20px 20px;
            color: #6a7080;
            font-size: 12px;
        }
        .badge {
            display: inline-block;
            background: rgba(201,168,76,0.2);
            border-radius: 20px;
            padding: 2px 8px;
            font-size: 10px;
            color: #C9A84C;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>⚡ TBE ট্রেডিং সিস্টেম</h1>
        <p>ভার্সন সিলেক্ট করুন (নতুন ট্যাবে ওপেন হবে)</p>
    </div>

    <div class="version-grid" id="versionGrid">
        <!-- ভার্সনগুলো জাভাস্ক্রিপ্ট দিয়ে জেনারেট করব -->
    </div>

    <div class="footer">
        © 2025 TBE ট্রেডিং সিস্টেম
    </div>
    <div class="tips">
        💡 টিপ: ভার্সনে ক্লিক করলে নতুন ট্যাবে খুলবে | মোট ২৯টি ভার্সন উপলব্ধ
    </div>
</div>

<script>
    // 1 থেকে 29 পর্যন্ত ভার্সন জেনারেট করুন
    const versions = [];
    for(let i = 1; i <= 29; i++) {
        versions.push(i);
    }

    // আইকন অ্যাসাইনমেন্ট (ভিন্ন ভিন্ন আইকন দিতে)
    const icons = {
        base: ['📘', '📙', '📗', '📕', '⚡', '🔥', '🚀', '⭐', '🎯', '💎', '🏆', '🔮', '📊', '💡', '🛠️', '⚙️', '📈', '💰', '🎲', '🔑', '🎓', '🏅', '📌', '📍', '✨', '🌟', '💫', '⚡', '🔥']
    };

    function generateVersionCards() {
        const grid = document.getElementById('versionGrid');
        grid.innerHTML = '';
        
        versions.forEach((v, index) => {
            const card = document.createElement('div');
            card.className = 'version-card';
            card.onclick = () => openInNewTab(`tbe${v}`);
            
            // আইকন নির্বাচন
            let icon = icons.base[index % icons.base.length];
            
            // বিশেষ ভার্সনের জন্য বিশেষ আইকন
            if(v === 20) icon = '🏆';
            if(v === 1) icon = '🌟';
            if(v === 29) icon = '💎';
            
            card.innerHTML = `
                <div class="version-icon">${icon}</div>
                <div class="version-number">TBE ${v}</div>
                <div class="badge">ভার্সন ${v}</div>
                <div class="load-btn">লোড করুন →</div>
            `;
            grid.appendChild(card);
        });
    }

    function openInNewTab(version) {
        const url = version + ".html";
        window.open(url, '_blank');
    }

    // পেজ লোড হলে কার্ড জেনারেট করুন
    generateVersionCards();
</script>
</body>
</html>
